services:
  db:
    image: postgis/postgis:16-3.4
    container_name: drivelegal-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: drivelegal
      POSTGRES_USER: drivelegal
      POSTGRES_PASSWORD: drivelegal
    ports:
      - "5432:5432"
    volumes:
      - drivelegal_pgdata:/var/lib/postgresql/data
      - ./backend/sql/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: drivelegal-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@drivelegal.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

  backend:
    build:
      context: ./backend
    container_name: drivelegal-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://drivelegal:drivelegal@db:5432/drivelegal
      PORT: 4000
      CORS_ORIGIN: http://localhost:5173
      LLM_MODEL: gpt-4.1-mini
    ports:
      - "4000:4000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    container_name: drivelegal-frontend
    restart: unless-stopped
    ports:
      - "5173:4173"
    depends_on:
      - backend

volumes:
  drivelegal_pgdata:
